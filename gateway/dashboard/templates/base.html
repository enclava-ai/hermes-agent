<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hermes Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard/static/vendor/pico.min.css">
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <main class="container">
        <div id="error-banner" class="error-banner" role="alert" aria-live="assertive"></div>
        {% block content %}{% endblock %}
    </main>

    <script src="/dashboard/static/vendor/htmx.min.js"></script>
    <script>
    // Global HTMX error handler — must be registered before any htmx:* events fire.
    // Without this, 4xx/5xx responses are silently swallowed (RESEARCH.md Pitfall 6).
    document.body.addEventListener('htmx:responseError', function(evt) {
        var banner = document.getElementById('error-banner');
        var xhr = evt.detail.xhr;
        banner.textContent = 'Error ' + xhr.status + ': ' + (xhr.responseText || xhr.statusText);
        banner.style.display = 'block';
        // Auto-hide after 8 seconds
        setTimeout(function() { banner.style.display = 'none'; }, 8000);
    });
    // Also clear error banner on successful responses
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.successful) {
            document.getElementById('error-banner').style.display = 'none';
        }
    });
    </script>
</body>
</html>
