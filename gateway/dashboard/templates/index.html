{% extends "base.html" %}

{% block title %}Dashboard — Hermes{% endblock %}

{% block content %}
<nav>
    <ul>
        <li><strong>HERMES</strong></li>
    </ul>
    <ul>
        <li><a href="/dashboard/wizard" class="secondary outline" role="button">Setup Wizard</a></li>
        <li><a href="#" class="secondary outline" role="button" hx-post="/dashboard/logout">Sign out</a></li>
    </ul>
</nav>

<nav>
    <ul role="tablist">
        <li><a href="#" class="active" hx-get="/dashboard/settings/llm" hx-target="#tab-content" hx-swap="innerHTML">LLM</a></li>
        <li><a href="#" hx-get="/dashboard/settings/general" hx-target="#tab-content" hx-swap="innerHTML">General</a></li>
        <li><a href="#" hx-get="/dashboard/settings/status" hx-target="#tab-content" hx-swap="innerHTML">Status</a></li>
        <li><a href="#" hx-get="/dashboard/settings/platforms" hx-target="#tab-content" hx-swap="innerHTML">Platforms</a></li>
        <li><a href="#" hx-get="/dashboard/settings/skills" hx-target="#tab-content" hx-swap="innerHTML">Skills</a></li>
        <li><a href="#" hx-get="/dashboard/settings/logs" hx-target="#tab-content" hx-swap="innerHTML">Logs</a></li>
    </ul>
</nav>

<span id="tab-loading" class="htmx-indicator">Loading...</span>

<div id="tab-content"
     hx-get="/dashboard/settings/llm"
     hx-trigger="load"
     hx-indicator="#tab-loading">
</div>

<script>
document.querySelector('[role="tablist"]').addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    this.querySelectorAll('a').forEach(function(a) { a.classList.remove('active'); });
    link.classList.add('active');
});
</script>
{% endblock %}
