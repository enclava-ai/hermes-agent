<nav class="wizard-steps" aria-label="Setup progress">
  {% for step in steps %}
  <div class="wizard-step {% if step.number == current_step %}wizard-step-active{% elif step.number in completed_steps %}wizard-step-done{% endif %}">
    <span class="wizard-step-number">
      {% if step.number in completed_steps and step.number != current_step %}&#10003;{% else %}{{ step.number }}{% endif %}
    </span>
    <span class="wizard-step-label">{{ step.name }}</span>
  </div>
  {% if not loop.last %}<span class="wizard-step-connector"></span>{% endif %}
  {% endfor %}
</nav>
