{% extends "base.html" %}

{% block title %}Set Password — Hermes{% endblock %}

{% block content %}
<article class="login-card">
    <header>
        <h2>Set Your Password</h2>
        <p>First-run password detected. Set a new password to continue.</p>
    </header>

    {% if error %}
    <div class="error-banner" style="display:block" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/dashboard/change-password">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               required value="{{ username or 'admin' }}">

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password"
               autocomplete="new-password" required minlength="8">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               autocomplete="new-password" required minlength="8">

        <button type="submit">Set Password</button>
    </form>
</article>
{% endblock %}
